services:
  - type: web
    name: carbon-verify-app01
    runtime: docker
    plan: starter
    dockerfilePath: ./Dockerfile
    healthCheckPath: /api/v1/health
    envVars:
      - key: SECRET_KEY
        generateValue: true
      - key: DATABASE_URL
        fromDatabase:
          name: carbon-verify-db
          property: connectionString
      - key: PORT
        value: "10000"
      - key: CORS_ORIGINS
        value: "https://carbon-verify-app01.onrender.com"
      - key: RATE_LIMIT_PER_MINUTE
        value: "120"
      - key: NASA_FIRMS_API_KEY
        value: ""
      - key: COPERNICUS_API_KEY
        value: ""
      - key: WEB3_RPC_URL
        value: "https://polygon-rpc.com"

databases:
  - name: carbon-verify-db
    plan: free
    databaseName: carbon_verify
    user: cv_admin
